<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>
</head>
<body>

    <!-- Main Heading -->
    <h1>Welcome to My Website</h1>

    <!-- Subheading -->
    <h2>About This Page</h2>

    <!-- Paragraph with bold and italic text -->
    <p>This is a sample paragraph. HTML allows you to easily format text to make it <strong>bold</strong> or <em>italicized</em>.</p>

    <!-- Hyperlink -->
    <p>Visit the official <a href="https://www.w3schools.com" target="_blank">W3Schools website</a> for more tutorials.</p>

    <!-- Unordered List -->
    <h2>My Favorite Fruits</h2>
    <ul>
        <li>Apples</li>
        <li>Bananas</li>
        <li>Oranges</li>
    </ul>

    <!-- Image Example -->
    <h2>Sample Image</h2>
    <img src="https://placeholder.com" alt="Placeholder Image" width="150" height="150">

</body>
</html>
